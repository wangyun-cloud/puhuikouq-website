name: Deploy Website to Aliyun FC

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: wplpjccf
          NEXT_PUBLIC_SANITY_DATASET: production
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Bundle Node.js for custom runtime
        run: |
          curl -fsSL https://nodejs.org/dist/v20.12.2/node-v20.12.2-linux-x64.tar.xz -o node.tar.xz
          tar -xf node.tar.xz
          mv node-v20.12.2-linux-x64 .node
          rm node.tar.xz

      - name: Install Serverless Devs v2
        run: npm install @serverless-devs/s@2 -g

      - name: Configure Aliyun credentials
        run: |
          mkdir -p ~/.s
          cat > ~/.s/access.yaml << 'EOF'
          default:
            AccountID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
            AccessKeyID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
            AccessKeySecret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          EOF

      - name: Deploy to Aliyun FC
        run: s deploy --use-local -y
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
