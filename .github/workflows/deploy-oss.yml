name: Deploy Website to Aliyun OSS

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-oss.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: wplpjccf
          NEXT_PUBLIC_SANITY_DATASET: production

      - name: Install ossutil
        run: |
          curl -L https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64 -o ossutil
          chmod +x ossutil
          ./ossutil config -e ${{ secrets.OSS_ENDPOINT }} -i ${{ secrets.OSS_ACCESS_KEY_ID }} -k ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload to OSS
        run: |
          ./ossutil rm -rf oss://${{ secrets.OSS_BUCKET }}/ || true
          ./ossutil cp -rf dist/ oss://${{ secrets.OSS_BUCKET }}/
